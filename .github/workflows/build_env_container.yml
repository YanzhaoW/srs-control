name: build-env

on:
  workflow_dispatch:

jobs:
  docker-build:
    # environment: docker_deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'true'

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        id: push
        with:
          push: true
          context: utils/container_env/fedora
          tags: ghcr.io/yanzhaow/srs_env:fedora
          build-args: |
            BASE_IMAG=fedora:44
